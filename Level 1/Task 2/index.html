<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Mini Projects. </title>
 
    <style>
        *  {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body  {
            background: linear-gradient(135deg, #6a85ff, #9b59b6);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0 ;
        } 

        .box {
            width: 400px;
            background: white;
            padding:25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color:  #333;
        }

        .section {
            margin:20px 0;
        }

        input {
            width: 80%;
            padding: 10px;
            margin: 5px;
            border: 1px solid gray;
            border-radius: 5px;
         }

         button {
            background-color: #6a85ff;
            color: white;
            border: none;
            padding: 10px 15px;
            margin-top: 8px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #4f6de0;
        }

        #result {
            margin-top: 10px;
            font-size: 18px;
            color: green;
        }
     </style>
</head>
<body>

<div class="box">
    <h1>JavaScript Mini Projects</h1>

    <div class="section">
        <h3>Change Button Color </h3>
        <button id="colorBtn">Click Me</button>
    </div>


    <div class="section">
        <h3>Greeting Message</h3>
        <button onclick="greet()">Show Greeting</button>
    </div>

    <div class="section">
        <h3>Add Two  Numbers</h3>

        <input type="number" id="num1" placeholder="First Number">
        <input type="number" id="num2" placeholder="Second Number">
        <br>
        <button onclick="add()">Add</button>

        <p id="result"> </p>
    </div>
</div>

<script>
    let colorBtn = document .getElementById("colorBtn");

    colorBtn.onclick = function() {
        colorBtn.style.backgroundColor = "green";
        colorBtn.innerHTML = "Done";
    };
 
    function greet() {
        let time = new Date().getHours();

        if (time < 12) {
            alert("Good Morning");
        } else if (time < 18) {
            alert("Good Afternoon");
        } else {
            alert("Good Evening");
        }
    } 

    function add() {
        let a = Number(document.getElementById("num1").value);
        let b = Number(document.getElementById("num2").value);
 
        document.getElementById("result").innerHTML = "Result: " + (a + b);
    }  

</script>

</body>

</html>
